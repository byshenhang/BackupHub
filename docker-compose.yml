services:
  backup-hub:
    build:
      context: .
    image: backup-hub:local
    container_name: backup-hub
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: sqlite:////app/data/backup-hub.db
      TIMEZONE: ${TIMEZONE:-Asia/Shanghai}
    ports:
      - "${BACKUP_HUB_PORT:-8010}:8000"
    volumes:
      - backuphub-data:/app/data
      - backuphub-logs:/app/logs
    stop_grace_period: 30s

volumes:
  backuphub-data:
  backuphub-logs:
