<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Backup-Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: #fff; border-radius: 12px; padding: 40px; width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .login-card h1 { text-align: center; font-size: 24px; color: #1a1a2e; margin-bottom: 8px; }
        .login-card .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 28px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #555; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; transition: border-color 0.2s; }
        .form-group input:focus { outline: none; border-color: #1a73e8; }
        .btn-login { width: 100%; padding: 12px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-login:hover { background: #1557b0; }
        .error { background: #f8d7da; color: #721c24; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; text-align: center; }
        .icon { text-align: center; font-size: 48px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon">🗄️</div>
        <h1>Backup-Hub</h1>
        <p class="subtitle">备份管理平台</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="请输入登录密码" required autofocus>
            </div>
            <button type="submit" class="btn-login">登录</button>
        </form>
    </div>
</body>
</html>
