{% extends "base.html" %}
{% block title %}{{ '编辑' if storage else '新增' }}存储目标 - Backup-Hub{% endblock %}
{% block content %}
<div class="toolbar">
    <h2>{{ '编辑' if storage else '新增' }}存储目标</h2>
    <a class="btn btn-outline" href="/storages">返回</a>
</div>

<div class="card" style="max-width:720px;">
    <form id="storage-form" onsubmit="submitStorage(event)">
        <div class="form-group">
            <label for="storage-name">名称</label>
            <input id="storage-name" name="name" required
                   value="{{ storage.name if storage else '' }}">
        </div>
        <div class="form-group">
            <label for="storage-type">存储类型</label>
            <select id="storage-type" name="storage_type" onchange="updateConfigFields(this.value)">
                <option value="local" {{ 'selected' if storage and storage.storage_type.value == 'local' else '' }}>本地目录</option>
                <option value="oss" {{ 'selected' if storage and storage.storage_type.value == 'oss' else '' }}>阿里云 OSS</option>
                <option value="webdav" {{ 'selected' if (storage and storage.storage_type.value == 'webdav') or not storage else '' }}>WebDAV</option>
            </select>
        </div>

        <div id="config-local" class="config-section">
            <div class="form-group">
                <label for="local-path">本地目录</label>
                <input id="local-path" name="local_path" value="{{ storage_config.get('path', '') }}">
            </div>
        </div>

        <div id="config-oss" class="config-section">
            <div class="form-group">
                <label for="oss-access-key-id">Access Key ID</label>
                <input id="oss-access-key-id" name="oss_access_key_id" value="{{ storage_config.get('access_key_id', '') }}">
            </div>
            <div class="form-group">
                <label for="oss-access-key-secret">{{ '新 Access Key Secret' if storage_config.get('access_key_secret_configured') else 'Access Key Secret' }}</label>
                <input id="oss-access-key-secret" type="password" name="oss_access_key_secret" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="oss-endpoint">Endpoint</label>
                <input id="oss-endpoint" name="oss_endpoint" value="{{ storage_config.get('endpoint', '') }}">
            </div>
            <div class="form-group">
                <label for="oss-bucket">Bucket</label>
                <input id="oss-bucket" name="oss_bucket" value="{{ storage_config.get('bucket', '') }}">
            </div>
            <div class="form-group">
                <label for="oss-prefix">路径前缀</label>
                <input id="oss-prefix" name="oss_prefix" value="{{ storage_config.get('prefix', 'backup-hub/') }}">
            </div>
        </div>

        <div id="config-webdav" class="config-section">
            <div class="form-group">
                <label for="webdav-url">WebDAV URL</label>
                <input id="webdav-url" type="url" name="webdav_url" value="{{ storage_config.get('url', '') }}">
            </div>
            <div class="form-group">
                <label for="webdav-username">用户名</label>
                <input id="webdav-username" name="webdav_username" value="{{ storage_config.get('username', '') }}">
            </div>
            <div class="form-group">
                <label for="webdav-password">{{ '新应用密码' if storage_config.get('password_configured') else '应用密码' }}</label>
                <input id="webdav-password" type="password" name="webdav_password" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="webdav-remote-path">远端路径</label>
                <input id="webdav-remote-path" name="webdav_remote_path" value="{{ storage_config.get('remote_path', '/backup-hub/') }}">
            </div>
        </div>

        <div class="form-actions">
            <button class="btn btn-primary" type="submit">保存</button>
            <button class="btn btn-outline" type="button" onclick="testStorage(this)">测试连接</button>
            <a class="btn btn-outline" href="/storages">取消</a>
        </div>
        <div id="form-result" class="status-message" role="status"></div>
    </form>
</div>

<script>
const storageId = {{ storage.id if storage else 'null' }};

function updateConfigFields(type) {
    document.querySelectorAll('.config-section').forEach(section => {
        section.style.display = section.id === `config-${type}` ? 'block' : 'none';
    });
}

function storagePayload() {
    const form = document.getElementById('storage-form');
    const data = new FormData(form);
    const type = data.get('storage_type');
    const config = {};
    if (type === 'local') {
        config.path = data.get('local_path');
    } else if (type === 'oss') {
        config.access_key_id = data.get('oss_access_key_id');
        config.access_key_secret = data.get('oss_access_key_secret');
        config.endpoint = data.get('oss_endpoint');
        config.bucket = data.get('oss_bucket');
        config.prefix = data.get('oss_prefix') || 'backup-hub/';
    } else {
        config.url = data.get('webdav_url');
        config.username = data.get('webdav_username');
        config.password = data.get('webdav_password');
        config.remote_path = data.get('webdav_remote_path') || '/backup-hub/';
        config.verify_ssl = true;
    }
    return {name: data.get('name'), storage_type: type, config};
}

function showFormResult(message, success) {
    const result = document.getElementById('form-result');
    result.textContent = message;
    result.className = 'status-message ' + (success ? 'success' : 'error');
}

async function testStorage(button) {
    button.disabled = true;
    const payload = storagePayload();
    const response = await fetch('/api/storages/test', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({storage_id: storageId, storage_type: payload.storage_type, config: payload.config})
    });
    const body = await response.json();
    button.disabled = false;
    showFormResult(body.message || body.detail, response.ok);
}

async function submitStorage(event) {
    event.preventDefault();
    const payload = storagePayload();
    const response = await fetch(storageId ? `/api/storages/${storageId}` : '/api/storages', {
        method: storageId ? 'PUT' : 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    const body = await response.json();
    if (response.ok) {
        window.location.href = '/storages';
    } else {
        showFormResult(body.detail || '保存失败。', false);
    }
}

updateConfigFields(document.getElementById('storage-type').value);
</script>
{% endblock %}
