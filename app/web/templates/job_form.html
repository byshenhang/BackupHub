{% extends "base.html" %}
{% block title %}{{ '编辑' if job else '新建' }}任务 - Backup-Hub{% endblock %}
{% block content %}
{% set source_mode = job_config.get('source_mode', 'single' if job_config.get('repository_url') else 'gitlab') %}
<h2>{{ '编辑' if job else '新建' }}备份任务</h2>

<div class="card" style="max-width: 700px;">
    <form id="job-form" onsubmit="submitForm(event)">
        <div class="form-group">
            <label>任务名称</label>
            <input type="text" name="name" required placeholder="如：GitHub 私有仓库备份"
                   value="{{ job.name if job else '' }}">
        </div>

        <div class="form-group">
            <label>任务类型</label>
            <select name="job_type" required>
                <option value="git" {{ 'selected' if job and job.job_type.value == 'git' else '' }}>GitHub/通用 Git/GitLab 仓库备份</option>
                <option value="file" {{ 'selected' if job and job.job_type.value == 'file' else '' }} disabled>文件目录备份（即将支持）</option>
                <option value="database" {{ 'selected' if job and job.job_type.value == 'database' else '' }} disabled>数据库备份（即将支持）</option>
            </select>
        </div>

        <div class="form-group">
            <label>调度周期（cron 表达式）</label>
            <input type="text" name="cron_expression" required placeholder="0 2 * * *（每天凌晨 2 点）"
                   value="{{ job.cron_expression if job else '0 2 * * *' }}">
        </div>

        <div class="form-group">
            <label>存储目标</label>
            <select name="storage_target_id">
                <option value="">-- 不上传（仅本地保留） --</option>
                {% for s in storages %}
                <option value="{{ s.id }}" {{ 'selected' if job and job.storage_target_id == s.id else '' }}>
                    {{ s.name }}（{{ s.storage_type.value }}）
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>保留天数</label>
            <input type="number" name="retention_days" min="1" max="365"
                   value="{{ job.retention_days if job else 30 }}">
        </div>

        <div class="form-group">
            <label>启用状态</label>
            <select name="enabled">
                <option value="true" {{ 'selected' if not job or job.enabled else '' }}>启用</option>
                <option value="false" {{ 'selected' if job and not job.enabled else '' }}>停用</option>
            </select>
        </div>

        <hr style="margin: 20px 0; border: none; border-top: 1px solid #eee;">
        <h3 style="margin-bottom: 16px;">Git 备份配置</h3>

        <div class="form-group">
            <label for="source-mode">备份来源</label>
            <select id="source-mode" name="source_mode" onchange="toggleSourceMode(this.value)">
                <option value="single" {{ 'selected' if source_mode == 'single' else '' }}>单个 GitHub / Git 仓库</option>
                <option value="gitlab" {{ 'selected' if source_mode == 'gitlab' else '' }}>GitLab 全量项目</option>
            </select>
        </div>

        <div id="single-source-section">
            <div class="form-group">
                <label for="repository-url">仓库 URL</label>
                <input type="text" name="repository_url"
                       placeholder="https://github.com/owner/repository.git"
                       value="{{ job_config.get('repository_url', '') }}"
                       id="repository-url">
            </div>
        </div>

        <div id="gitlab-source-section">
            <div class="form-group">
                <label for="gitlab-url">GitLab URL</label>
                <input type="text" name="gitlab_url" placeholder="https://gitlab.example.com"
                       value="{{ job_config.get('gitlab_url', '') }}"
                       id="gitlab-url">
            </div>
            <div class="form-group">
                <label for="gitlab-token">新 GitLab Token</label>
                <input type="password" name="gitlab_token" placeholder="glpat-xxxx"
                       autocomplete="new-password" id="gitlab-token">
            </div>
        </div>

        <div class="form-group">
            <label>克隆认证方式</label>
            <select name="auth_type" onchange="toggleAuthFields(this.value)">
                <option value="token" {{ 'selected' if job_config.get('auth_type', 'token') == 'token' else '' }}>HTTP Token（默认）</option>
                <option value="ssh" {{ 'selected' if job_config.get('auth_type') == 'ssh' else '' }}>SSH Key</option>
            </select>
        </div>

        <div id="ssh-key-section" style="display: none;">
            <div class="form-group">
                <label>SSH 私钥</label>
                <textarea name="ssh_key" rows="8" placeholder="粘贴 SSH 私钥内容（-----BEGIN OPENSSH PRIVATE KEY----- ...）"
                          style="font-family: monospace; font-size: 12px;"></textarea>
            </div>
        </div>

        <div style="margin-top: 24px; display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">{{ '保存修改' if job else '创建任务' }}</button>
            <a href="/jobs" class="btn btn-outline">取消</a>
        </div>
    </form>
</div>

<script>
function toggleAuthFields(type) {
    document.getElementById('ssh-key-section').style.display = type === 'ssh' ? 'block' : 'none';
}

function toggleSourceMode(mode) {
    document.getElementById('single-source-section').style.display = mode === 'single' ? 'block' : 'none';
    document.getElementById('gitlab-source-section').style.display = mode === 'gitlab' ? 'block' : 'none';
}

async function submitForm(e) {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);

    const data = {
        name: formData.get('name'),
        job_type: formData.get('job_type'),
        cron_expression: formData.get('cron_expression'),
        enabled: formData.get('enabled') === 'true',
        retention_days: parseInt(formData.get('retention_days')) || 30,
        storage_target_id: formData.get('storage_target_id') ? parseInt(formData.get('storage_target_id')) : null,
        config: {}
    };

    // Git 配置
    const sourceMode = formData.get('source_mode');
    const authType = formData.get('auth_type');
    const sshKey = formData.get('ssh_key');
    data.config.source_mode = sourceMode;
    if (sourceMode === 'single') {
        data.config.repository_url = formData.get('repository_url');
    } else {
        data.config.gitlab_url = formData.get('gitlab_url');
        const gitlabToken = formData.get('gitlab_token');
        if (gitlabToken) data.config.gitlab_token = gitlabToken;
    }
    if (authType) data.config.auth_type = authType;
    if (sshKey && authType === 'ssh') data.config.ssh_key = sshKey;

    {% if job %}
    // 编辑模式
    const resp = await fetch('/api/jobs/{{ job.id }}', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    {% else %}
    // 新建模式
    const resp = await fetch('/api/jobs', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    {% endif %}

    if (resp.ok) {
        window.location.href = '/jobs';
    } else {
        const err = await resp.json();
        alert('操作失败：' + (err.detail || JSON.stringify(err)));
    }
}

toggleSourceMode(document.getElementById('source-mode').value);
toggleAuthFields(document.querySelector('[name="auth_type"]').value);
</script>
{% endblock %}
